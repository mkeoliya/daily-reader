<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today's Reading — Daily Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    --text: #1a1a2e;
    --text-secondary: #4a4a6a;
    --text-muted: #8888a0;
    --bg: #fefefe;
    --bg-alt: #f8f7f4;
    --bg-code: #f5f4f0;
    --accent: #2d5a8e;
    --accent-light: #e8f0fe;
    --border: #e2e0dc;
    --max-width: 680px;
    --radius: 8px;
}

@media (prefers-color-scheme: dark) {
    :root {
        --text: #e0e0e8;
        --text-secondary: #a0a0b8;
        --text-muted: #6a6a80;
        --bg: #0f0f14;
        --bg-alt: #161620;
        --bg-code: #1c1c28;
        --accent: #5b9bd5;
        --accent-light: #1a2a3e;
        --border: #2a2a3a;
    }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
    font-size: 18px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    scroll-behavior: smooth;
}

body {
    font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
    line-height: 1.75;
    color: var(--text);
    background: var(--bg);
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
}

/* -- Header / progress -- */
.dr-header {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
}

.dr-header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.25rem;
}

.dr-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 0.75rem;
}

.dr-progress-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: var(--border);
    z-index: 1000;
}

.dr-progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
}

.dr-done {
    text-align: center;
    padding: 2rem;
    margin-top: 2rem;
    font-family: 'Inter', sans-serif;
    color: var(--text-muted);
    font-size: 0.9rem;
    border-top: 1px solid var(--border);
}

.dr-done .checkmark {
    font-size: 2rem;
    display: block;
    margin-bottom: 0.5rem;
}

/* -- Content typography -- */
h1, h2, h3, h4, h5, h6 {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.3;
    margin-top: 2.5rem;
    margin-bottom: 0.75rem;
    color: var(--text);
}

h1 { font-size: 2rem; font-weight: 700; border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem; margin-top: 3rem; }
h2 { font-size: 1.5rem; font-weight: 600; color: var(--accent); }
h3, h4 { font-size: 1.15rem; font-weight: 600; color: var(--text-secondary); }

p {
    margin-bottom: 1.25rem;
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
}

blockquote {
    border-left: 3px solid var(--accent);
    margin: 1.5rem 0;
    padding: 0.75rem 1.25rem;
    color: var(--text-secondary);
    background: var(--accent-light);
    border-radius: 0 var(--radius) var(--radius) 0;
    font-style: italic;
}

pre {
    background: var(--bg-code);
    padding: 1rem 1.25rem;
    border-radius: var(--radius);
    overflow-x: auto;
    font-size: 0.85rem;
    line-height: 1.6;
    margin: 1.5rem 0;
    border: 1px solid var(--border);
}

code {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.85em;
    background: var(--bg-code);
    padding: 0.15em 0.4em;
    border-radius: 4px;
}

pre code { background: none; padding: 0; font-size: inherit; }

table {
    border-collapse: collapse;
    width: 100%;
    margin: 1.5rem 0;
    font-size: 0.9rem;
}

th, td { border: 1px solid var(--border); padding: 0.6rem 0.9rem; text-align: left; }
th {
    background: var(--accent-light);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
}

img {
    max-width: 100%;
    height: auto;
    border-radius: var(--radius);
    margin: 1.5rem auto;
    display: block;
}

a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s ease; }
a:hover { border-bottom-color: var(--accent); }

.katex-display { margin: 1.5rem 0; overflow-x: auto; padding: 0.5rem 0; }

ul, ol { margin: 1rem 0 1.5rem 1.5rem; }
li { margin-bottom: 0.4rem; }

hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }

/* -- Page separator -- */
.page { margin-bottom: 2rem; }
.page + .page { padding-top: 2rem; border-top: 1px dashed var(--border); }

/* -- Responsive -- */
@media (max-width: 600px) {
    html { font-size: 16px; }
    body { padding: 1rem 1rem 3rem; }
    h1 { font-size: 1.6rem; }
    h2 { font-size: 1.3rem; }
    .dr-meta { flex-direction: column; gap: 0.25rem; }
}

/* -- Bookshelf -- */
.bookshelf { list-style: none; padding: 0; margin: 0; }
.bookshelf li {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
}

.bookshelf .progress-ring {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
}

.bookshelf .book-info { flex: 1; }
.bookshelf .book-title {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    color: var(--text);
}

.bookshelf .book-progress {
    font-size: 0.8rem;
    color: var(--text-muted);
}
</style>

</head>
<body>

<header class="dr-header">
  <h1>📖 Today's Reading</h1>
  <div class="dr-meta"><span>March 21, 2026</span></div>
</header>
<main>
  <ul class="bookshelf">
    
    <li>
      <div class="book-info">
        <div class="book-title"><a href="https://mkeoliya.github.io/daily-reader/pages/2026-03-21/">Deep Learning - First 10 Pages — Pages 1–10/10</a></div>
        <div class="book-progress">~1 min read</div>
      </div>
    </li>
    
    <li>
      <div class="book-info">
        <div class="book-title"><a href="https://mkeoliya.github.io/daily-reader/pages/2026-03-21/">Deep Learning — Pages 1–10/656</a></div>
        <div class="book-progress">~1 min read</div>
      </div>
    </li>
    
  </ul>
</main>


</body>
</html>
