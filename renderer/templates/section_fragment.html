{# section_fragment.html — Bare HTML fragment for lazy-loaded sections #}
{% include "_article.html" %}
{% if next_section %}
{% set ns = next_section %}
<a href="section-{{ ns.slug }}.html" data-section>Continue to {{ ns.section_name }} →</a>
{% else %}
<div class="dr-done">
  <span class="checkmark">✅</span>
  Done for today. See you tomorrow.
</div>
{% endif %}
