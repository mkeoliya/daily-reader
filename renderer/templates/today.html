{% extends "base.html" %}
{% block body %}
<header class="dr-header">
  <h1>📖 Today's Reading</h1>
  <div class="dr-meta"><span>{{ today_date }}</span></div>
</header>
<main>
  <ul class="bookshelf">
    {% for item in items %}
    <li>
      <div class="book-info">
        <div class="book-title"><a href="{{ item.url }}">{{ item.title }}</a></div>
        <div class="book-progress">{{ item.subtitle }}</div>
      </div>
    </li>
    {% endfor %}
  </ul>
</main>
{% endblock %}
