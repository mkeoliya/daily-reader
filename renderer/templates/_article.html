{# _article.html — Reusable article block for a single section #}
<article id="section-{{ s.slug }}">
  <h2 class="dr-section-title">{{ s.section_name }}</h2>
  {% for doc in s.documents %}
  <div class="dr-doc"{% if doc.pdf_filename %} data-pdf="{{ doc.pdf_filename }}"{% endif %}>
    <div class="dr-doc-header">
      <h3>{{ doc.title }}</h3>
      <span class="dr-meta">{{ doc.page_info }}</span>
    </div>
    <div class="dr-doc-body">{{ doc.body_html | safe }}</div>
    {% if doc.pdf_filename %}<div class="pdf-view"></div>{% endif %}
  </div>
  {% endfor %}
</article>
